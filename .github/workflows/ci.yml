name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Check formatting with ruff
        run: ruff format --check src/ tests/

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Type check with mypy
        # TODO: Remove continue-on-error after fixing #48
        continue-on-error: true
        run: mypy src/

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=xml --cov-report=term-missing
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  scenarios:
    # E2E scenario suite — exercises the full detector / rollup /
    # newsletter-render path through the himalaya CLI. Separate job
    # so a himalaya build failure doesn't block the unit-test run.
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # Download a pre-built himalaya binary from the fork's releases
      # page. Matches the minVersion pinned in the AMI-STREAMS
      # extension.manifest.yaml (see SPEC-MAIL §10). Operators can
      # override HIMALAYA_VERSION in the workflow dispatch UI.
      - name: Install himalaya
        env:
          HIMALAYA_VERSION: ${{ vars.HIMALAYA_VERSION || '1.2.0' }}
        run: |
          set -eux
          mkdir -p "$GITHUB_WORKSPACE/.boot-linux/bin"
          curl -fsSL \
            "https://github.com/Independent-AI-Labs/himalaya/releases/download/v${HIMALAYA_VERSION}/himalaya-linux-x86_64" \
            -o "$GITHUB_WORKSPACE/.boot-linux/bin/himalaya"
          chmod +x "$GITHUB_WORKSPACE/.boot-linux/bin/himalaya"
          "$GITHUB_WORKSPACE/.boot-linux/bin/himalaya" --version

      - name: Verify golden-review gate
        run: python scripts/review-snapshot.py --check

      - name: Run scenario suite
        env:
          PATH: ${{ github.workspace }}/.boot-linux/bin:${{ env.PATH }}
        run: pytest tests/scenarios -q

      - name: Upload golden snapshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-snapshots
          path: tests/scenarios/fixtures/golden/
          if-no-files-found: warn
